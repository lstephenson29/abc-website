backend:
  name: git-gateway
  branch: main

media_folder: static/assets
public_folder: ./assets

collections:
  # =====================================================================
  # GLOBAL SETTINGS (header, footer, logo)
  # =====================================================================
  - name: settings
    label: Settings
    files:
      - name: globals
        label: Header & Footer
        file: content/globals.json
        fields:
          - name: header
            label: Header
            widget: object
            fields:
              - { name: logo_image, label: Logo Image, widget: image, hint: "Upload your logo (SVG or PNG recommended)" }
              - { name: logo_text, label: Logo Text (HTML), widget: string, hint: "Use <br> for line break. e.g. Advanced Battery<br>Concepts" }
              - { name: logo_aria_label, label: Logo Accessibility Label, widget: string }
              - name: nav_items
                label: Navigation Links
                widget: list
                fields:
                  - { name: label, label: Link Text, widget: string }
                  - { name: href, label: Link URL, widget: string }
                  - { name: nav_key, label: Nav Key (for active state), widget: string, hint: "e.g. technology, applications, batterybarn, about, contact" }
              - { name: cta_text, label: CTA Button Text, widget: string }
              - { name: cta_href, label: CTA Button Link, widget: string }

          - name: footer
            label: Footer
            widget: object
            fields:
              - { name: tagline, label: Footer Tagline, widget: text }
              - name: columns
                label: Footer Link Columns
                widget: list
                fields:
                  - { name: heading, label: Column Heading, widget: string }
                  - name: links
                    label: Links
                    widget: list
                    fields:
                      - { name: label, label: Link Text, widget: string }
                      - { name: href, label: Link URL, widget: string }
              - { name: copyright, label: Copyright Text, widget: string }

  - name: pages
    label: Pages
    files:
      # =====================================================================
      # HOME PAGE (index.json)
      # =====================================================================
      - name: index
        label: Home Page
        file: content/index.json
        fields:
          - name: meta
            label: Meta / SEO
            widget: object
            fields:
              - { name: title, label: Page Title, widget: string }
              - { name: description, label: Meta Description, widget: text }
              - { name: og_title, label: Open Graph Title, widget: string }
              - { name: og_description, label: Open Graph Description, widget: text }

          - name: head_extra
            label: Head Extra (Custom CSS/HTML)
            widget: text

          - name: hero
            label: Hero Section
            widget: object
            fields:
              - { name: label, label: Hero Label, widget: string }
              - { name: title, label: Hero Title, widget: string }
              - { name: subtitle, label: Hero Subtitle, widget: text }
              - { name: image_src, label: Hero Image, widget: image }
              - { name: image_alt, label: Hero Image Alt Text, widget: string }
              - { name: cta_primary_text, label: Primary CTA Text, widget: string }
              - { name: cta_primary_href, label: Primary CTA Link, widget: string }
              - { name: cta_secondary_text, label: Secondary CTA Text, widget: string }
              - { name: cta_secondary_href, label: Secondary CTA Link, widget: string }

          - name: microgrid
            label: Microgrid Section
            widget: object
            fields:
              - { name: image_src, label: Image, widget: image }
              - { name: image_alt, label: Image Alt Text, widget: string }
              - { name: label, label: Section Label, widget: string }
              - { name: title, label: Section Title, widget: string }
              - { name: desc, label: Section Description, widget: text }

          - name: spec_bar
            label: Spec Bar
            widget: list
            fields:
              - { name: value, label: Value, widget: string }
              - { name: label, label: Label, widget: string }

          - name: deployments
            label: Deployments Section
            widget: object
            fields:
              - { name: label, label: Section Label, widget: string }
              - { name: title, label: Section Title, widget: string }
              - { name: desc, label: Section Description, widget: text }
              - name: items
                label: Deployment Items
                widget: list
                fields:
                  - { name: icon, label: Icon / Number Label, widget: string }
                  - { name: title, label: Title, widget: string }
                  - { name: desc, label: Description, widget: text }

          - name: environments
            label: Environments Section
            widget: object
            fields:
              - { name: label, label: Section Label, widget: string }
              - { name: title, label: Section Title, widget: string }
              - name: items
                label: Environment Items
                widget: list
                fields:
                  - { name: image_src, label: Image, widget: image }
                  - { name: image_alt, label: Image Alt Text, widget: string }
                  - { name: temp, label: Temperature / Condition, widget: string }
                  - { name: title, label: Title, widget: string }
                  - { name: desc, label: Description, widget: string }

          - name: image_break
            label: Image Break Section
            widget: object
            fields:
              - { name: image_src, label: Image, widget: image }
              - { name: image_alt, label: Image Alt Text, widget: string }
              - { name: quote, label: Quote Text, widget: string }

          - name: comparison
            label: Comparison Table Section
            widget: object
            fields:
              - { name: label, label: Section Label, widget: string }
              - { name: title, label: Section Title, widget: string }
              - { name: desc, label: Section Description, widget: text }
              - name: rows
                label: Comparison Rows
                widget: list
                fields:
                  - { name: spec, label: Specification, widget: string }
                  - { name: abc, label: ABC Value, widget: string }
                  - { name: lithium, label: Lithium Value, widget: string }

          - name: cta
            label: CTA Section
            widget: object
            fields:
              - { name: label, label: Section Label, widget: string }
              - { name: title, label: Section Title, widget: string }
              - { name: desc, label: Section Description, widget: text }
              - { name: cta_primary_text, label: Primary CTA Text, widget: string }
              - { name: cta_primary_href, label: Primary CTA Link, widget: string }
              - { name: cta_secondary_text, label: Secondary CTA Text, widget: string }
              - { name: cta_secondary_href, label: Secondary CTA Link, widget: string }

