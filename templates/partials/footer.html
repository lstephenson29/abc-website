{{#if show_footer_comment}}
<!-- FOOTER -->
{{/if}}<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <a href="./index.html" class="logo" aria-label="{{global_header.logo_aria_label}}">
        <img src="{{global_header.logo_image}}" alt="" aria-hidden="true" class="logo-img" style="width:32px;height:32px;">
      </a>
      <p>{{{global_footer.tagline}}}</p>
    </div>
{{#each global_footer.columns}}
    <div class="footer-col">
      <h4>{{heading}}</h4>
      <ul role="list">
{{#each links}}
        <li><a href="{{href}}">{{{label}}}</a></li>
{{/each}}
      </ul>
    </div>
{{/each}}
  </div>
  <div class="footer-bottom">
    <p>{{{global_footer.copyright}}}</p>
    <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
  </div>
</footer>

<script>
(function(){
  const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
  let d=r.getAttribute('data-theme')||'dark';
  t&&t.addEventListener('click',()=>{
    d=d==='dark'?'light':'dark';
    r.setAttribute('data-theme',d);
    t.setAttribute('aria-label','Switch to '+(d==='dark'?'light':'dark')+' mode');
    t.innerHTML=d==='dark'?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>':'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  });
})();
</script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", function(user) {
      if (!user) {
        window.netlifyIdentity.on("login", function() {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
</body>
</html>
