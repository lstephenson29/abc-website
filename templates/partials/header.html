<body>

{{#if show_skip_link}}
<!-- SKIP LINK -->
<a href="#main" class="sr-only" style="position:fixed;top:0;left:0;z-index:200;background:var(--color-primary);color:var(--color-text);padding:var(--space-2) var(--space-4);font-size:var(--text-sm);">Skip to content</a>

<!-- HEADER -->
{{/if}}<header class="site-header">
  <div class="header-inner">
    <a href="./index.html" class="logo" aria-label="{{global_header.logo_aria_label}}">
      <img src="{{global_header.logo_image}}" alt="" aria-hidden="true" class="logo-img">
      <div class="logo-text">
        {{{global_header.logo_text}}}
      </div>
    </a>
    <button class="mobile-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.nav-links').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <nav>
      <ul class="nav-links" role="list">
{{#each global_header.nav_items}}
        <li><a href="{{href}}"{{#if _active}} class="active"{{/if}}>{{label}}</a></li>
{{/each}}
        <li>
          <button class="theme-toggle" data-theme-toggle aria-label="Switch to light mode">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          </button>
        </li>
        <li><a href="{{global_header.cta_href}}" class="btn btn--primary">{{global_header.cta_text}}</a></li>
      </ul>
    </nav>
  </div>
</header>
